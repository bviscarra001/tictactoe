<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe Online</title>
  <style>
    body { font-family: Arial; text-align: center; }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 5px;
      justify-content: center;
      margin-top: 20px;
    }
    .cell {
      width: 100px;
      height: 100px;
      font-size: 2em;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1em;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Tic Tac Toe Online</h1>
<p id="status">Conectando...</p>

<div class="board" id="board"></div>
<button onclick="resetGame()">Reiniciar</button>
  
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
  // 🔴 REEMPLAZA ESTO CON TU CONFIG DE FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyCpGqA769CtodnDMI_u0DkizmM45zs4n9M",
    authDomain: "elgato777-c333d.firebaseapp.com",
    projectId: "elgato777-c333d",
  };

  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const gameId = "partida1";
  const gameRef = db.collection("games").doc(gameId);

  let player = null;
  let board = Array(9).fill("");
  let turn = "X";
  let winner = null;

  const boardDiv = document.getElementById("board");
  const statusText = document.getElementById("status");


 function checkWinner(board) {
  const wins = [
    [0,1,2],
    [3,4,5],
    [6,7,8],
    [0,3,6],
    [1,4,7],
    [2,5,8],
    [0,4,8],
    [2,4,6]
  ];

  for (let combo of wins) {
    const a = combo[0];
    const b = combo[1];
    const c = combo[2];

    if (
      board[a] !== "" &&
      board[a] === board[b] &&
      board[a] === board[c]
    ) {
      return board[a];
    }
  }

  if (!board.includes("")) {
    return "Empate";
  }

  return null;
}
  function render() {
    boardDiv.innerHTML = "";
    board.forEach((cell, i) => {
      const div = document.createElement("div");
      div.className = "cell";
      div.innerText = cell;
      div.onclick = () => move(i);
      boardDiv.appendChild(div);
    });
  }

  function move(i) {
    if (board[i] !== "" || turn !== player || winner) return;

    board[i] = player;
    turn = player === "X" ? "O" : "X";
    winner = checkWinner(board);

    gameRef.set({ board, turn });
  }
function resetGame() {
  gameRef.set({
    board: Array(9).fill(""),
    turn: "X",
    winner: null
  });
}

//  gameRef.onSnapshot(doc => {
  //  if (doc.exists) {
    //  const data = doc.data();
      //board = data.board;
      //turn = data.turn;
      //render();
      //statusText.innerText = "Turno: " + turn;
   // }
  //});

  async function init() {
  try {
    const doc = await gameRef.get();

    if (!doc.exists) {
      player = "X";

      await gameRef.set({
        board: Array(9).fill(""),
        turn: "X",
        winner: null,
        players: 1
      });

    } else {
      const data = doc.data();

      if (!data.players) data.players = 1;

      if (data.players === 1) {
        player = "O";

        await gameRef.update({
          players: 2
        });

      } else {
        player = "Espectador";
      }
    }

    gameRef.onSnapshot((doc) => {
      const data = doc.data();

      board = data.board;
      turn = data.turn;
      winner = data.winner;

      render();

      if (winner) {
        statusText.innerText =
          winner === "Empate"
          ? "Empate :)"
          : "Ganó " + winner + " !!";
      } else {
        statusText.innerText =
          "Eres: " + player + " | Turno: " + turn;
      }
    });

  } catch (error) {
    console.log(error);
    statusText.innerText = "Error";
  }
}
  init();
  render();
</script>

</body>
</html>
