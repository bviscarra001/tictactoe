<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tic Tac Toe Online</title>
  <style>
    body { font-family: Arial; text-align: center; }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 5px;
      justify-content: center;
      margin-top: 20px;
    }
    .cell {
      width: 100px;
      height: 100px;
      font-size: 2em;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Tic Tac Toe Online</h1>
<p id="status">Conectando...</p>

<div class="board" id="board"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
  // 🔴 REEMPLAZA ESTO CON TU CONFIG DE FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyCpGqA769CtodnDMI_u0DkizmM45zs4n9M",
    authDomain: "elgato777-c333d.firebaseapp.com",
    projectId: "elgato777-c333d",
  };

  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const gameId = "partida1";
  const gameRef = db.collection("games").doc(gameId);

  let player = null;
  let board = Array(9).fill("");
  let turn = "X";

  const boardDiv = document.getElementById("board");
  const statusText = document.getElementById("status");

  function render() {
    boardDiv.innerHTML = "";
    board.forEach((cell, i) => {
      const div = document.createElement("div");
      div.className = "cell";
      div.innerText = cell;
      div.onclick = () => move(i);
      boardDiv.appendChild(div);
    });
  }

  function move(i) {
    if (board[i] !== "" || turn !== player) return;

    board[i] = player;
    turn = player === "X" ? "O" : "X";

    gameRef.set({ board, turn });
  }

  gameRef.onSnapshot(doc => {
    if (doc.exists) {
      const data = doc.data();
      board = data.board;
      turn = data.turn;
      render();
      statusText.innerText = "Turno: " + turn;
    }
  });

  async function init() {
  const doc = await gameRef.get();

  if (!doc.exists) {
    player = "X";
    await gameRef.set({
      board: Array(9).fill(""),
      turn: "X"
    });
  } else {
    // Alternar jugador correctamente
    const data = doc.data();
    
    // Si ya hay X, tú eres O
    player = data.turn === "X" ? "O" : "X";
  }

  statusText.innerText = "Eres: " + player;
}

  init();
  render();
</script>

</body>
</html>
